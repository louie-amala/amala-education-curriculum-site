id: concept-note-and-refinement
slug: concept-note-and-refinement
access: public
type: activity
title: Concept note and refinement
summary: >-
  Learners draft a short concept note explaining how their idea addresses the challenge
  ethically and sustainably while generating revenue, then refine it into a clear
  concept statement using feedback and testing.
facilitationContext: [group, one-to-one-mentoring]
primaryContext: group
deliveryAdaptations:
  - context: group
    how: >-
      As designed. The feedback round is what does the work, so have listeners read the draft in
      silence before anyone speaks and hold the receiving group to clarifying questions only. Where
      a group drafts together, make sure one person is actually writing, or the note never gets past
      discussion.
  - context: one-to-one-mentoring
    how: >-
      Strong for drafting and revision, because a mentor will press on the revenue section harder
      than peers usually do, but the learner loses the spread of readers a peer round gives them.
      Book the slot once a first draft exists rather than before, and still have at least one person
      outside the course hear the concept statement and say back what they understood by it.
duration: About 3 to 4 hours across drafting, feedback and revision
grouping: Project groups or individuals, with one-to-one mentoring where it can be arranged; works with 15-35 learners
whatLearnersDo:
  - Look back at what your testing actually showed before you write anything down.
  - Map your idea onto a social business model canvas so the gaps become visible.
  - Draft a short concept note that a stranger could read and understand.
  - Explain how the idea sustains itself financially and how it stays ethical.
  - Take structured feedback and cut the note down to one clear concept statement.
materialsAndPreparation:
  - A social business model canvas per group, printed or drawn on large paper.
  - A concept note structure or template with headings, so learners are shaping content rather than inventing a format.
  - Each group's testing log, evidence and earlier financial modelling work to hand.
  - Feedback prompts printed for the peer round, so listeners have a fixed job.
  - Mentoring slots booked in advance where mentors or additional educators are available.
  - A short worked example of a weak concept statement alongside a strong one, for comparison.
facilitationNotes: |
  This activity consolidates the second objective. After testing, learners pin their
  thinking down in writing: what the enterprise does, why it matters, how it addresses
  the challenge, and how it stays ethical, sustainable and financially viable. The note
  is a thinking tool first and a document second, and it becomes the foundation for the
  pitch work that follows. The one thing to get right is the money. Learners write
  warmly about impact and then go quiet about how anything is paid for, so hold the line
  that a social enterprise concept is incomplete until it says, at least roughly, where
  income or resources come in and what it costs to run. Treat the note as iterative
  rather than a single submission, and judge it on whether someone new to the idea could
  follow it.
steps:
  - title: Take stock of what testing changed
    duration: 20-30 min
    guidance: |
      Before any drafting, each group reviews its testing log and answers what they
      tested, what worked and why, what did not, and what feedback they received from
      users, peers and mentors. Then they sort their thinking into what to continue,
      what to stop and what to adapt. This keeps the concept note anchored in evidence
      rather than in the version of the idea they started with.
    keyPrompts:
      - What do you now know that you did not know before you tested?
      - Which part of the original idea has quietly disappeared, and should it?
      - Has your understanding of the problem itself changed?
    watchOuts:
      - Groups write the concept note from memory and never open the testing log; require at least three specific findings to be named before drafting begins.
    adaptation: |
      This works as a short written reflection set as independent work, with the sorting
      into continue, stop and adapt done at the start of the next session.
  - title: Work through a social business model canvas
    duration: 45-60 min
    guidance: |
      Introduce the canvas as a way of seeing the whole idea at once, then give groups
      real time to fill it in. Focus on the sections that matter most here: whether the
      idea still fits the problem, the value proposition and the social or environmental
      benefit it delivers, the key stakeholders and partners needed for it to work, and a
      first picture of costs and income. The empty boxes are the point, because they show
      where the thinking has not happened yet.
    keyPrompts:
      - Who exactly benefits, and what changes for them?
      - Who has to say yes for this to be possible at all?
      - Which box is empty because it is genuinely uncertain, and which because you have avoided it?
    watchOuts:
      - Learners fill every box with something plausible so it looks finished; praise honest blanks and ask what they would need to find out to fill them.
      - The value proposition is written as an activity rather than a benefit, for example running workshops instead of what changes because the workshops happen.
    adaptation: |
      The canvas can be drawn on a single sheet of paper or in a notebook and needs no
      digital tool. Groups working apart can each complete a copy and compare
      photographs, which usefully exposes where members disagree.
  - title: Draft the concept note
    duration: 45-60 min
    guidance: |
      Learners turn the canvas into a short piece of continuous writing covering the
      challenge and who it affects, what the enterprise does and how it addresses that
      challenge, the benefit it creates, who needs to be involved, how it sustains itself
      financially, and how it stays ethical, inclusive and responsible. Draw directly on
      the earlier money-making versus problem-solving and financial modelling work so the
      revenue section has some grounding. Insist on language a non-expert could follow.
    keyPrompts:
      - Where does the money or the resource come from, in one sentence?
      - What does this cost to run for a month, roughly?
      - Could someone who has never met you read this and explain it back to you?
      - Who could be harmed or left out by this idea, and what would you do about that?
    watchOuts:
      - The note describes a worthwhile activity but never explains the revenue model; treat it as unfinished until income and costs appear, however rough the numbers.
      - Impact claims outrun the testing, so a single positive conversation becomes proof of demand; ask which line of the testing log supports each claim.
      - Learners hide uncertainty behind vague wording; make it explicit that naming what is still unknown reads as strength rather than weakness.
    adaptation: |
      Drafting is well suited to independent work between sessions. Where writing at
      length is a barrier, learners can record the note as a spoken explanation and
      transcribe the key points into the structure afterwards.
  - title: Run a structured feedback round
    duration: 40-50 min
    guidance: |
      Groups share their draft with peers, and with a mentor or educator one to one where
      that is possible. Give listeners fixed prompts rather than open comment: what is
      strong and clear, what is unclear or missing, what they would want to know as a
      potential supporter, and whether it makes them want to get involved. Ask each group
      to write the feedback down as it comes, since they will not remember it accurately
      afterwards.
    keyPrompts:
      - What did you understand this enterprise to actually do?
      - What question would you ask before you gave them any time or money?
      - What did you not believe, and what would change your mind?
    watchOuts:
      - Groups explain their idea verbally so well that the note is never really tested; have listeners read the note first, in silence, before anyone speaks.
      - Feedback is collected and immediately argued with; ask the receiving group to only ask clarifying questions during the round, and to decide what to act on afterwards.
    adaptation: |
      Where mentors cannot attend, a mentor can read one or two notes and reply by voice
      note or message. Between-session feedback can be run by passing printed notes
      around with a comment sheet attached.
  - title: Cut it down to a clear concept statement
    duration: 30-40 min
    guidance: |
      Learners revise the note using the feedback and what testing taught them, then
      distil it into a short concept statement: a confident description of what the
      enterprise is, who it serves, what it changes and how it sustains itself, in a few
      sentences. This statement is what the pitch will be built on, so it should be
      sayable out loud without reading.
    keyPrompts:
      - Can you say what this is in three sentences, without notes?
      - Which words in here would a person outside this course not understand?
      - What did you cut, and are you sure it was not the most important part?
    watchOuts:
      - The statement becomes a slogan with no substance; check it still names the problem, the users and the way the enterprise keeps going.
      - Groups treat this as final; make clear the statement will keep changing as the pitch work continues.
    adaptation: |
      Learners can test the statement by saying it to someone outside the course, in
      person or by phone, and reporting back what that person understood it to mean.
closing: |
  Ask each group to read their concept statement aloud and to name one thing about the
  idea they are still unsure of. Collect those uncertainties, since several of them will
  become the questions the pitch audience asks. Learners keep the concept note as a
  living document, updating it as their thinking changes, and carry both the note and
  the statement forward as the raw material for the pitch deck and concept brief.
agencyContribution:
  indicators: [control-of-future-pathways]
  how: >-
    Getting the whole idea into writing, with the money, the risks and the unknowns named, leaves
    learners holding a plan they own and can hand to somebody else. That makes it far more likely
    the idea travels beyond the course, whether they go on to run it, seek support for it, or use
    it as evidence of what they can do on the pathway they pick next.
principlesForegrounded: [responsible-action, recognise-communicate-growth, lifeworthy-competencies]
principleAlignment:
  - principle: responsible-action
    how: >-
      The note counts as unfinished until it says how the idea stays ethical and inclusive, who
      could be harmed or left out, and where the income and costs sit. Drafting responsibility and
      viability in the same document stops either one becoming an appendix to the other.
  - principle: recognise-communicate-growth
    how: >-
      Groups must reopen their testing log and name at least three findings before drafting, so the
      note records what changed rather than the idea they arrived with. The final statement then has
      to be sayable out loud to someone outside the course who can repeat back what they understood.
  - principle: lifeworthy-competencies
    how: >-
      Writing so a stranger can follow it, receiving fixed-prompt feedback without arguing back, and
      cutting the whole thing to three sentences are all transferable. Treating the note as a living
      document that keeps changing is how such documents actually behave outside the course.
competencyCodes: [FSI2, FLC1, APS4, FTS2]
competencyDevelopment:
  - code: FSI2
    how: >-
      This is where an idea is refined rather than invented: the canvas exposes which parts have not
      been thought through, and the note has to show the idea still fits the problem and can sustain
      itself. The distance between the pre-testing version and the final concept statement is what
      learners can show.
  - code: FLC1
    how: >-
      Learners are asked directly who could be harmed or left out by the idea and what they would do
      about it, and to state how the enterprise stays inclusive and responsible. Writing honest
      uncertainty into the note instead of hiding it behind vague wording is part of what is judged.
  - code: APS4
    how: >-
      Sorting what to continue, stop and adapt after testing, then defending the resulting model
      against listeners working from fixed prompts, is a comparison of options on feasibility and
      likely effect. The evidence is the line of the testing log behind each claim, together with a
      rough picture of what it costs to run and where income comes from.
  - code: FTS2
    how: >-
      This applies only where the idea rests on scientific understanding, for example a claim about
      health, waste or an environmental effect. Those learners show it by explaining in the note why
      the intervention should work, rather than asserting that it does.
