id: idea-generation-and-prioritisation
slug: idea-generation-and-prioritisation
access: public
type: activity
title: Idea generation and prioritisation
summary: >-
  Learners generate a wide range of possible enterprise ideas in response to their
  challenge, then use structured criteria to prioritise the ones worth testing.
facilitationContext: [group]
primaryContext: group
deliveryAdaptations:
  - context: group
    how: >-
      As designed, and it leans on the group in two places: the no-judgement brainstorm needs enough
      people for ideas to build on each other, and the argument over where an idea sits on the
      matrix is what stops learners scoring a favourite as high impact. Keep groups at three to five
      and pool everything onto one wall before converging, so nobody prioritises from a thin list.
duration: About 2 hours
grouping: Small groups of 3 to 5; works with 15 to 35 learners
whatLearnersDo:
  - Generate a long list of possible enterprise ideas in response to their challenge, without judging them yet.
  - Push for quantity and unusual ideas, including ones they could try with little or no budget.
  - "Filter the list against clear criteria: impact and effort, safe to fail, testable soon, and ethical and sustainable."
  - Choose a shortlist of small, testable ideas and prepare to explain why they picked them.
materialsAndPreparation:
  - Sticky notes or cards and markers, or a shared online board, for the idea generation phase.
  - Large paper or board space to draw an effort and impact matrix (effort on one axis, impact on the other).
  - The safe-to-fail checklist (safe to fail, testable soon, doable with what you already have) printed or on a slide.
  - Learners' earlier research, leverage points and circle of influence work to hand, so ideas connect to where change is possible.
facilitationNotes: |
  The whole point of this activity is to keep two phases genuinely separate: first diverge (generate
  ideas freely, without judgement), then converge (prioritise against criteria). The one thing to get
  right is holding off evaluation during generation, and then, when prioritising, making learners
  justify their choices against the criteria rather than simply defending a favourite. Keep reminding
  them that a strong candidate both addresses the challenge and brings in some revenue: that is what
  makes it a social enterprise rather than a one-off good deed.
steps:
  - title: Set up the challenge and reconnect the research
    duration: 10-15 min
    guidance: |
      Remind learners of the challenge they have been investigating and where change looked possible in
      their earlier work on leverage points and the circle of influence. Make the aim explicit: they are
      looking for an idea that addresses the challenge and also generates some income, because that
      combination is what makes it a social enterprise.
    keyPrompts:
      - What is the specific problem you are trying to act on?
      - Which parts of it sit inside your circle of influence or control?
      - Where in the system might a small change make a real difference?
    watchOuts:
      - "Learners arrive already fixed on one pet idea. Park it on a note straight away and tell them they must generate alternatives first; they can return to it during prioritisation."
    adaptation: |
      For low-bandwidth or async delivery, set this as pre-work: ask learners to re-read their research
      notes and write their challenge in a single sentence before the session, so class time goes
      straight into generating ideas.
  - title: Generate ideas without judgement
    duration: 30-35 min
    guidance: |
      Run a divergent brainstorm: one idea per note, quantity over quality, unusual ideas welcome. Use
      the prompts to keep ideas flowing, and remind learners that each idea should aim both to address
      the challenge and to generate some income to sustain the work.
    keyPrompts:
      - What small action could you take this week?
      - What have you seen work somewhere else?
      - What could you try with little or no budget?
      - How could this idea also bring in some income?
    watchOuts:
      - "Learners start critiquing ideas as they surface, which shuts down the flow. State a clear no-judgement rule, capture every idea however rough, and defer all evaluation to the next phase."
    adaptation: |
      For large groups, brainstorm in small groups first and then pool everything onto one shared wall.
      For async delivery, collect ideas on a shared document or board over a day, which also gives
      quieter learners room to contribute.
  - title: Sort ideas on an effort and impact matrix
    duration: 25-30 min
    guidance: |
      Move into convergence. Draw an effort axis and an impact axis and ask learners to plot each idea.
      Ideas in the high-impact, low-effort corner are the strongest candidates. The goal is to compare
      ideas against each other, not to pick a favourite.
    keyPrompts:
      - How much difference could this idea make to the challenge?
      - How much effort, time or resource would it take?
      - Which of your ideas sit in the high-impact, low-effort corner?
    watchOuts:
      - "Learners rate ideas by personal preference dressed up as impact. Ask for the evidence or reasoning behind each placement, pointing them back to their research."
    adaptation: |
      With no wall space or when offline, draw the two-by-two grid on paper or in a notebook and simply
      list ideas in each quadrant instead of plotting notes.
  - title: Apply the safe-to-fail check
    duration: 20-25 min
    guidance: |
      Run the shortlisted ideas through the safe-to-fail checklist: is it safe to fail (little or no
      harm), can it be tested soon, and is it doable with what you already have (or a smaller version of
      it). Prompt learners to weigh ethics and sustainability too: is the idea responsible, inclusive and
      affordable in their context.
    keyPrompts:
      - If this idea does not work, will any real harm be done?
      - Could you test it, or a small version of it, in the next few weeks with what you have?
      - Is it responsible, inclusive and affordable in your context?
    watchOuts:
      - "Ideas are too big to test, because learners want to trial the whole enterprise at once. Help them carve out the smallest testable slice rather than discarding the idea altogether."
    adaptation: |
      Give the checklist as a short homework worksheet that learners complete on their top few ideas,
      then bring their answers to the next session for discussion.
  - title: Choose and justify a shortlist
    duration: 15-20 min
    guidance: |
      Each group chooses a shortlist of small, testable candidates and prepares to explain why they
      picked those over the others. This is the handover into the prototype testing phase, so keep the
      shortlist concrete.
    keyPrompts:
      - Which ideas are you carrying forward, and why these rather than the rest?
      - What is the very first small test you could run on the strongest one?
    watchOuts:
      - "Learners pick by silent vote with no rationale. Require a one-line justification for each shortlisted idea against the criteria they have just used."
    adaptation: |
      For async delivery, learners post their shortlist and justifications to a shared board so the
      facilitator and peers can comment before the next session.
closing: |
  Close with a short share-out: each group names one shortlisted idea and the first small test they
  could run on it. Ask learners to keep both the shortlist and the effort and impact matrix, as these
  become the starting point for prototype testing with users.
agencyContribution:
  indicators: [control-of-future-pathways]
  how: >-
    Learners produce their own list of options and then decide, against criteria they have applied
    themselves, which ideas to carry forward and why. Choosing the direction of their own enterprise
    rather than being handed a project is what gives them control over the pathway they take next,
    and the same filtering habit applies to choices well beyond this course.
principlesForegrounded: [authentic-challenges, responsible-action, lifeworthy-competencies]
principleAlignment:
  - principle: authentic-challenges
    how: >-
      Ideas are generated against the specific challenge learners researched, and filtered for what
      could be tested within weeks using what they already have, so what leaves the session is a
      small real action rather than a hypothetical enterprise.
  - principle: responsible-action
    how: >-
      The safe-to-fail check asks directly whether an idea could do harm and whether it is
      responsible, inclusive and affordable in the learners' own context, so ethics is one of the
      filters that decides the shortlist rather than a comment made afterwards.
  - principle: lifeworthy-competencies
    how: >-
      Holding divergence and convergence apart, then requiring a justification against stated
      criteria instead of a silent vote, is a way of deciding that learners can reuse on any choice
      they face, not a routine that only works on enterprise ideas.
competencyCodes: [FSI2, APS4, FLC1]
competencyDevelopment:
  - code: FSI2
    how: >-
      The brainstorm is where ideation is actually practised, under a no-judgement rule and with
      every idea expected both to address the challenge and to bring in some income. The long list
      and the shortlist drawn from it are what learners can show for it.
  - code: APS4
    how: >-
      Plotting ideas on effort against impact, then putting the survivors through the safe-to-fail
      check, is a structured comparison of options on feasibility, effort and likely impact. The
      one-line justification for each shortlisted idea, argued against the criteria rather than by
      preference, is the evidence.
  - code: FLC1
    how: >-
      Learners have to ask whether an idea could harm anyone and whether it is responsible and
      inclusive before it goes any further, which means an idea can be dropped on ethical grounds
      alone. How they defend or discard an idea on those grounds shows whether the principle is
      being applied or recited.
