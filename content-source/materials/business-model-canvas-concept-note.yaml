provenanceNote: >-
  Grounded in the 2025 course planner (Part 5.1 "Social Business Model Canvas") and the course guide's objective 2, which suggests learners draft a "concept note". The named "Social Business Model Canvas" is referenced in the planner; the concept note is the guide's own term.
