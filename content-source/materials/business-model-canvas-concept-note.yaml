id: business-model-canvas-concept-note
slug: business-model-canvas-concept-note
access: public
type: tools-approaches
title: Business Model Canvas or concept note
summary: A single-page structure for setting out how an enterprise idea creates value, who it serves, and how it sustains itself.
facilitationContext: [group, independent, one-to-one-mentoring]
primaryContext: group
deliveryAdaptations:
  - context: group
    how: >-
      As designed. Learners fill the page in pairs or teams with an educator circulating to link
      sections back to their earlier work, then run the structured peer round, which is what catches
      the section someone has quietly left blank.
  - context: independent
    how: >-
      Usable alone, and the single page does much of the work by making gaps visible, but nothing
      tests whether it reads clearly to anyone else. Have the learner send the finished page to one
      peer or mentor with the three feedback questions attached; a canvas nobody has read only
      proves it made sense to the person who wrote it.
  - context: one-to-one-mentoring
    how: >-
      A good fit, because a mentor can press on the weak section straight away and ask the cost and
      revenue questions peers tend to be polite about. The thing to watch is the mentor ending up
      writing the page, so keep the mentor to questions and leave the pen with the learner.
toolsFacet: analytical
educatorContent: |
  This tool helps learners pull the pieces of their idea together into one place they can see, test and share. Two forms serve the same purpose at different levels of detail. A concept note is a short written statement of how an idea addresses a challenge ethically and sustainably while generating revenue. The Social Business Model Canvas is a one-page grid that lays the same thinking out in sections so gaps become obvious.

  Introduce it once learners have an idea worth structuring, typically after piloting has begun. Emphasise that by this point they already hold most of the content, from earlier work on problem identification, stakeholder mapping, financial modelling and testing; the canvas just organises it. Core sections to complete:
  - Problem and solution fit: does the idea still respond to the core problem, and has the problem changed?
  - Value proposition: what social or environmental benefit is delivered, and to whom?
  - Key stakeholders and partners: who must be involved for it to work?
  - Revenue streams and cost structure: what will it cost, and how will income or resources come in?

  Facilitate with plenty of working time in pairs or teams, circulating to help learners connect sections back to earlier activities ("you already explored this in your ecosystem map"). Provide sentence starters and examples for learners who stall. Then run structured peer feedback: is it clear what this enterprise does and why it matters, what is strong, what is confusing or missing, and would you want to get involved?

  Watch for canvases that are impressive on the value proposition but silent on how the idea pays for itself, or the reverse. The point of a single page is that these tensions sit side by side. Keep reminding learners it is both a thinking process and a communication product, and that it feeds directly into the business plan and the pitch.
learnerContent: |
  Bring your idea together on a single page. You can write a short concept note (a few paragraphs) or fill in a business model canvas grid. Either way, cover:
  - Problem and solution fit: what problem does your idea address, and does it still fit now you have researched and tested?
  - Value proposition: what social or environmental benefit do you deliver, and for whom?
  - Key stakeholders and partners: who needs to be involved for this to work?
  - Revenue and costs: what will it cost to run, and how will money or resources come in?

  Most of this you already worked out in earlier activities. Pull it into one place so the gaps show up.

  Then swap with a peer and ask: is it clear what my enterprise does and why it matters? What is confusing or missing? Would this make you want to get involved?
agencyContribution:
  indicators: [control-of-future-pathways]
  how: >-
    Pulling problem fit, value proposition, partners, costs and income onto one page turns a set of
    course activities into a plan the learner owns, can hand to someone and can keep revising as
    the idea changes. Holding a plan at that level of detail is what makes it possible to carry the
    enterprise on after the course, or to use it as the case for the study, work or funding they
    choose to pursue next.
principlesForegrounded: [responsible-action, feedback-and-data]
principleAlignment:
  - principle: responsible-action
    how: >-
      The single page forces the money questions to sit alongside the social benefit, so a learner
      cannot claim impact without also saying what it costs, who has to be involved and where income
      comes from. That is the point at which a good intention becomes something that could actually
      be run without harm.
  - principle: feedback-and-data
    how: >-
      Every section is meant to be filled from work already done in problem research, ecosystem
      mapping, financial modelling and testing, so learners are justifying from their own evidence
      rather than inventing. The structured peer round then supplies the outside read: what is
      strong, what is missing, and whether anyone would want to get involved.
competencyCodes: [FSI2, APS4, FLC1]
competencyDevelopment:
  - code: FSI2
    how: >-
      Refining the idea happens in the gaps the page exposes, typically a confident value
      proposition sitting next to an empty revenue section. The completed canvas, and specifically
      what the learner changed after the peer round, is what shows the idea being developed rather
      than restated.
  - code: APS4
    how: >-
      Feasibility, cost and benefit sit side by side on one sheet, which makes learners judge
      whether the idea holds up rather than whether it sounds good. Their answer on problem and
      solution fit, particularly where the problem itself has shifted since they started, is where
      that judgement is visible.
  - code: FLC1
    how: >-
      Naming the benefit and who receives it, and naming who must be involved for it to work, makes
      learners state whose interests the enterprise serves. How they answer a peer who asks who
      carries the cost, or who is left out, is the evidence of the principles guiding their choices.
