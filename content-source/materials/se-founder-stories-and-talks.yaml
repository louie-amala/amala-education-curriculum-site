provenanceNote: >-
  Grounded in the 2025 course planner, which lists these talks as additional resources
  for the early sessions on understanding social enterprise. Presenters, titles, and
  approximate running times are taken from the planner; specific URLs are not reproduced
  and each source is marked [to verify]. Do not treat the descriptions as endorsements
  of current availability.
