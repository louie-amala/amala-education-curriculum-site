id: community-mapping-and-empathy-interviews
slug: community-mapping-and-empathy-interviews
access: public
type: activity
title: Community mapping and empathy interviews
summary: Learners go into their community to observe, listen and map who is affected by and connected
  to a challenge, gathering first-hand perspectives through empathy walks, interviews and conversations.
facilitationContext:
- group
- independent
primaryContext: group
deliveryAdaptations:
- context: group
  how: >-
    As designed. The co-created ethics checklist in step 1 and the comparison of maps in the
    closing both need the whole class present, so keep those in the room; the fieldwork itself
    stays individual or in pairs so every learner brings back their own encounters.
- context: independent
  how: >-
    Workable, since the fieldwork is solo anyway, but the learner loses the shared ground rules
    and the moment where different maps contradict each other. Walk through the ethics and risk
    check with them directly before they go out, and pair them with at least one other person to
    swap maps and surprises afterwards, even asynchronously.
duration: About 3 hours of class time, plus several hours of independent fieldwork
grouping: Individual or pairs; works with 15-35 learners
whatLearnersDo:
- Agree together what makes research ethical and safe before anyone goes out.
- Go on an empathy walk to observe a place in your community closely and respectfully.
- Hold empathy interviews and informal conversations with people connected to the challenge.
- Map everyone and everything connected to the challenge, marking what you are still only assuming.
- Bring your notes, your map and one thing that surprised you back to share with the group.
materialsAndPreparation:
- Large paper, sticky notes and coloured pens, or a shared digital board such as Miro, for the ecosystem
  map.
- 'A short empathy-walk clip or your own worked example so you can model the technique in class. "[to
  verify: the 2025 planner links a specific empathy-walk video]"'
- A co-created checklist for ethical and safe research covering consent, privacy, respect, do no harm
  and personal safety.
- An ethics and risk check each learner completes and you review before any fieldwork begins.
- 'A way for learners to record what they notice: notebooks, sketching paper, or a phone for notes and
  voice memos.'
facilitationNotes: |
  This is the primary-research heart of the first objective: learners have already chosen a
  challenge that matters to them, and here they leave the classroom to build a grounded,
  human understanding of it. The one thing to get right is stance. Learners should approach
  people with curiosity, not as a checklist to complete, and should treat what community
  members say as the centre of the work rather than a garnish on their own assumptions. Do
  not let anyone begin fieldwork until they have thought through the ethics and safety of
  their plan.
steps:
- title: Define empathy and agree the ground rules
  duration: 30-40 min
  guidance: |
    Open by building a shared meaning of empathy, then co-create the rules for ethical and
    safe research. As a minimum the class should agree to ask permission, keep private
    anything a person wants kept private, be respectful, and avoid putting themselves or
    anyone else at risk (for example telling someone where they are going and meeting in a
    public place or online). Capture the agreement as a visible checklist learners can carry
    with them.
  keyPrompts:
  - What does empathy actually mean to you, and can you give an example and a non-example?
  - What would make someone feel uncomfortable or unsafe if we spoke to them?
  - What is the minimum we all promise to do to keep people, and ourselves, safe?
  watchOuts:
  - Learners rush past the ethics as a formality; refuse to sign off any fieldwork plan until each learner
    can say what consent looks like for their specific situation.
  adaptation: |
    With no reliable connectivity, skip any video and model empathy with a two-minute
    spoken story of your own, then run the discussion on paper. The checklist can be
    built on a board and photographed rather than shared online.
- title: Model and plan the empathy walk
  duration: 20-30 min
  guidance: |
    Show what an empathy walk is: going to a place in the community with the specific
    intention of noticing what people seem to be needing, feeling or struggling with.
    Model it briefly, then give learners quiet time to plan their own: where they will
    go, who or what they will observe, and how they will record what they notice.
  keyPrompts:
  - Where in your community would be a good place to slow down and pay attention?
  - 'What kinds of things do you want to notice: signs of struggle, moments of connection, access to services?'
  - How will you record what you see without staring at people or photographing them without permission?
  watchOuts:
  - Learners plan to observe people intrusively or covertly; redirect them towards awareness of a place
    and its patterns, not surveillance of individuals.
  adaptation: |
    If learners cannot get out into a new setting, an empathy walk can be done in a place
    they already pass through daily, or replaced with close observation of their own
    household or Amala centre, recorded as homework between sessions.
- title: Run the empathy walk, interviews and conversations
  duration: Independent, several hours
  guidance: |
    Assign the fieldwork to non-class time, since it happens out in the community. Learners
    carry out their empathy walk, then have one-to-one empathy interviews and informal
    conversations with people who experience or work on the challenge. Ask them to lead with
    open questions, listen far more than they speak, and record who said what and where the
    information came from through notes, sketches or voice memos.
  keyPrompts:
  - Can you tell me more about what a normal day is like for you?
  - What is the hardest part of this for you, and what have you tried?
  - Who else do you think I should be listening to about this?
  watchOuts:
  - Learners fire leading or judgemental questions and treat the interview as extracting answers; before
    they go out, have them rehearse turning a leading question into an open one and practise staying quiet
    after asking.
  adaptation: |
    If learners cannot find community members to speak to, they can interview each other or
    people they already know, or run the conversation by phone or voice note. Keep a record
    of who could not be reached so gaps in the evidence are visible later.
- title: Map the ecosystem around the challenge
  duration: 40-60 min
  guidance: |
    Back in class, each learner places their chosen challenge at the centre of a page or
    board and maps the people, groups, institutions, cultural influences and natural systems
    connected to it. They draw labelled links showing the relationship (for example "provides
    funding" or "is negatively affected by"). Ask them to mark, in a different colour,
    anything they are only assuming and still need to check.
  keyPrompts:
  - Who is directly affected, and who has the power to influence this?
  - 'What does each link actually represent: money, rules, harm, support?'
  - Which parts of this map are things you know, and which are things you are guessing?
  watchOuts:
  - Maps become tidy lists of names with no relationships; push learners to write on every line what the
    connection is, and to name at least one assumption they need to verify.
  adaptation: |
    Sticky notes and string, or hand-drawn nodes on a single large sheet, work as well as
    any digital tool. For asynchronous groups, each learner photographs their map and the
    group compares them in a shared folder.
closing: |
  Bring the group back together and ask each learner to share their map and one thing that
  genuinely surprised them. Draw out where different learners heard conflicting things, and
  where the biggest gaps and assumptions still sit, since these become the questions that
  drive the next stage of research. Learners keep their notes and their map: both are
  living documents they will return to and update as their understanding grows.
agencyContribution:
  indicators:
  - contribution-to-community
  how: >-
    Learners gather first-hand accounts from people living with the challenge and map who else is
    connected to it, so the problem gets defined from community perspectives rather than from what
    learners assumed at the start. Contributions built on that grounding are far more likely to be
    impactful for the community, because they address what people actually said they need.
principlesForegrounded:
- authentic-challenges
- collaboration
- responsible-action
principleAlignment:
- principle: authentic-challenges
  how: >-
    The research happens out in the community on a challenge learners have already chosen, not on a
    case study, so the people affected have a stake in what learners find and the findings have to
    survive contact with a real place.
- principle: collaboration
  how: >-
    The understanding is assembled with community members through interviews and informal
    conversations, then brought back into the group in the closing, where conflicting accounts from
    different learners are surfaced rather than smoothed over.
- principle: responsible-action
  how: >-
    No one starts fieldwork until the class has written its own consent, privacy, respect and safety
    checklist and the facilitator has reviewed each learner's ethics and risk check, so the ethics
    of researching real people gates the work instead of following it.
competencyCodes:
- FSI1
- FPS3
- FLC1
- FTS3
competencyDevelopment:
- code: FSI1
  how: >-
    Planning and running their own empathy walk, interviews and conversations is where the primary
    research skill is built, and the field notes, the ecosystem map and the surprise each learner
    reports back are what show how well they did it.
- code: FPS3
  how: >-
    Mapping the people, groups, institutions, cultural influences and natural systems around the
    challenge, with every link labelled for what it actually carries, is how learners establish what
    is playing a part in the problem. The labelled links, and the assumptions marked in a second
    colour, show whether each claim is evidenced or still a guess.
- code: FLC1
  how: >-
    Learners set the moral principles for their own fieldwork and then have to hold to them in front
    of real people, asking permission, keeping confidences and observing places rather than
    individuals. Their signed-off ethics and risk check, and their account of how consent worked in
    practice, are the evidence.
- code: FTS3
  how: >-
    Qualitative data is collected first-hand through notes, sketches and voice memos, then organised
    onto one ecosystem map that separates what is known from what is assumed. The map and the notes
    behind it are the artefact learners can show.
