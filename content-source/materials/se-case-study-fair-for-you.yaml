id: se-case-study-fair-for-you
slug: se-case-study-fair-for-you
access: public
type: case-study
title: "Case study: Fair for You (affordable credit)"
summary: Learners examine a real social enterprise that offers affordable credit to low-income households, and analyse how its model links revenue to social impact.
facilitationContext: [group, independent]
primaryContext: group
deliveryAdaptations:
  - context: group
    how: >-
      As designed. Learners read the profile first, then work the questions in pairs or small
      groups, and the debrief is where the link between how the enterprise earns and how it helps
      gets made. Running it alongside the hiSbe Food case gives the comparison something to bite on.
  - context: independent
    how: >-
      The profile reads well alone and the questions can be answered in writing, but the comparison
      question and the argument about whether this is really a social enterprise both need someone
      to push back. Ask the learner to read the hiSbe Food profile as well so the comparison is
      still possible, and to take their answers to a peer or mentor afterwards.
educatorContent: |
  This case study introduces Fair for You, a social enterprise profiled in the Social
  Enterprise UK guide. Use it once learners understand what a social enterprise is and
  are starting to analyse existing models before shaping their own concept. It is a
  clear illustration of an enterprise whose commercial activity (lending) is also the
  mechanism for its social impact, which makes it a good example for the discussion
  about not confusing social need with commercial opportunity.

  Run it as a short analysis task. Give learners the profile below, or ask them to read
  it individually first, then work in pairs or small groups through the questions in the
  learner content. Draw out two ideas in the debrief: first, how the founder's own
  background and the stories she heard shaped the solution (a link back to primary
  research and empathy); second, how the enterprise earns money and reinvests through its
  legal ownership by a charity. Invite learners to compare it with another example (for
  instance the hiSbe Food case study) to notice different revenue models.

  Accuracy note for facilitators: the profile is grounded in the Social Enterprise UK
  guide, which was published some years ago. Treat specific figures and current-status
  claims (for example, that a share of customers reported improved child health, or that
  the enterprise is growing) as accurate at the time of the guide and mark them for
  learners as details to verify against the organisation's current reporting before
  citing them. Do not add figures or quotes beyond what the profile states.
learnerContent: |
  Read this profile, then discuss the questions with your group.

  Fair for You was founded by Angela Clements, who spent about five years leading a large
  community-based credit union in the Midlands (UK) after an early career as a banker.
  Listening to credit union members describe their experiences with high-cost lenders,
  she saw that some lenders had built models that targeted vulnerable households, and
  that a different approach was needed. The enterprise grew out of extensive listening to
  people in low-income households, especially parents of young children.

  Fair for You is set up as a Community Interest Company that is wholly owned by a
  charity. It earns revenue by providing credit that is affordable and structured around
  its customers' real borrowing needs. That same activity creates its social impact: it
  helps families afford essential appliances such as washing machines and refrigerators,
  spread the cost fairly, and reduce financial stress. According to the guide, around a
  third of customers reported that their children's health improved as well. [to verify]
  The enterprise reports on its social impact regularly.

  Questions to explore:
  - What social problem is Fair for You responding to, and how did the founder come to
    understand it?
  - How does the enterprise make its money, and how is earning money connected to the
    good it does? (Notice that the two are the same activity here.)
  - How does its legal structure (a Community Interest Company owned by a charity) help
    keep it focused on its mission?
  - What knowledge, skills, or values did the founder bring, and where might they have
    faced difficulty?
  - Why would you class this as a social enterprise rather than a charity or an ordinary
    business?
  - What could you borrow from this model for a challenge you care about, and what would
    have to be different in your own context?
agencyContribution:
  indicators: [control-of-future-pathways]
  how: >-
    Tracing the route from listening to credit union members to running a lending enterprise, and
    seeing how the ownership structure keeps it on mission, gives learners a worked example of a
    problem turning into something that pays for itself. The last question asks what they would
    borrow and what would have to be different where they live, so the case widens the set of
    future pathways they can picture for themselves rather than staying an admirable story.
principlesForegrounded: [authentic-challenges, responsible-action]
principleAlignment:
  - principle: authentic-challenges
    how: >-
      The material is a real enterprise built by a founder out of what she heard from people in
      low-income households, and the questions close by asking learners what they would take from
      it into a challenge they care about, so the analysis points back at their own work.
  - principle: responsible-action
    how: >-
      The questions go at the mechanism rather than the intention, asking how ownership by a
      charity holds the mission in place and why lending to households other lenders target is a
      different proposition. Learners are also shown which claims carry a to-verify mark and asked
      to check them before repeating them.
competencyCodes: [APS4, FLC1]
competencyDevelopment:
  - code: APS4
    how: >-
      Learners work out how one model ties revenue and impact into the same activity, and the
      prompt to set it beside hiSbe Food turns that into a comparison of two quite different ways
      of earning while doing good. The case builds the eye for that comparison; learners show the
      competency when they weigh options for their own idea.
  - code: FLC1
    how: >-
      Arguing why this counts as a social enterprise rather than a charity or an ordinary lender
      makes learners state the ethical line they are drawing, and the legal-structure question
      shows one way a founder builds that line into how the organisation is owned. What they take
      away is a test to apply to their own decisions later.
objectiveIds: [social-entrepreneurship--o2]
