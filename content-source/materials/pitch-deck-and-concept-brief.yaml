id: pitch-deck-and-concept-brief
slug: pitch-deck-and-concept-brief
access: public
type: activity
title: Pitch deck and concept brief
summary: >-
  Learners build the materials that carry their idea to an audience: a short pitch deck,
  a one-page concept brief and an elevator pitch, each with a clear ask.
facilitationContext: [group, independent]
primaryContext: group
deliveryAdaptations:
  - context: group
    how: >-
      As designed. Step 1 works because the class names the pitch ingredients together and that list
      stays on display, and steps 5 and the closing need live listeners to rehearse on. Protect the
      time for learners to hear each other, since that is where the ask gets sharpened.
  - context: independent
    how: >-
      Workable, because the building is individual anyway, but the learner loses the class-generated
      ingredient list and any audience. Give them the five ingredients directly, and have them record
      the elevator pitch and send it to a peer or mentor for one specific reaction; a pitch never
      spoken to a listener does not survive contact with one.
duration: About 3 to 4 hours, with independent time to build the materials
grouping: Individual or in enterprise teams; works with 15 to 35 learners
whatLearnersDo:
  - Study a couple of real social enterprise pitches and name what makes them work.
  - Pull their existing concept and business-plan work into a single pitch storyline.
  - Build a short pitch deck, a one-page concept brief and a one-minute elevator pitch.
  - Make sure every version ends with a clear, specific ask.
materialsAndPreparation:
  - One or two short social enterprise pitch videos queued up (download in advance if connectivity is unreliable).
  - Learners' concept notes and business plans to hand, so they build from existing content rather than starting over.
  - A pitch planning template or blank storyline sheet (problem, solution, evidence, vision, ask).
  - Slide software or paper and card for those without devices; printing for the one-page brief.
  - A visible list of the five pitch ingredients for learners to refer back to.
facilitationNotes: |
  The substance already exists from the concept and business-plan work; this activity is about
  shaping it for an audience. The one thing to get right is the ask. Learners describe their idea
  well and then forget to say what support they actually want, so hold them to naming something
  specific (time, connections, mentoring or funding) in every version they produce.
steps:
  - title: Dissect a real pitch and name the ingredients
    duration: 40 min
    guidance: |
      Watch one or two short social enterprise pitches together. Rather than lecturing on structure,
      draw the ingredients out of the class and record them in learners' own words. Aim to surface the
      five that recur: the problem and why it matters; the solution and how it works; evidence of
      testing or traction; the vision for impact; and the ask. Leave this list on display for the rest
      of the activity.
    keyPrompts:
      - What made that pitch compelling or memorable for you?
      - How clearly did they explain the problem, and then the solution?
      - Was there a story or personal connection, and did it help?
      - What exactly did they ask the audience for, and how did they phrase it?
    watchOuts:
      - Learners praise slick delivery and miss the structure. Ask them to replay the pitch in their heads and list what was said in what order, so they separate content from performance.
    adaptation: |
      With no reliable connectivity, use a short transcript or a written pitch example instead of video,
      or describe a pitch you have seen. As pre-work, learners can watch a pitch at home and bring their
      list of ingredients to the session.
  - title: Build the pitch storyline from existing work
    duration: 45 min
    guidance: |
      Have learners lay their concept note and business plan alongside the five ingredients and map what
      they already have against each one. The point is to reuse their thinking, not invent new material.
      Where a project relies on scientific or environmental understanding, coach them to state it plainly
      and accurately for a non-expert audience.
    keyPrompts:
      - Which parts of your business plan answer each of the five ingredients?
      - Where is your evidence thin, and what did your testing actually show?
      - What is the one sentence that makes someone care about this problem?
    watchOuts:
      - Learners claim more evidence than their pilot supports. Push them back to what they tested and observed, and have them phrase it as what they learned rather than what they proved.
    adaptation: |
      Learners short on device time can do this mapping on paper as homework, filling a five-box grid
      before the build sessions so class time goes on making the materials.
  - title: Build the pitch deck
    duration: 45 min
    guidance: |
      Learners turn the storyline into a short deck of a few clear slides, one idea per slide, following
      the order the class agreed. Keep language plain and audience-focused. Remind them the deck supports
      the spoken pitch rather than replacing it, so slides carry little text.
    keyPrompts:
      - If someone saw only your slides with no voiceover, what would they understand?
      - Which slide carries your ask, and is it specific?
    watchOuts:
      - Slides fill with dense paragraphs read aloud word for word. Set a rough limit on words per slide and have learners move detail into what they say.
    adaptation: |
      Without devices, learners build the deck on card, one sheet per slide, which also rehearses well
      because they hold up each sheet in turn.
  - title: Write the one-page concept brief
    duration: 30 min
    guidance: |
      Learners condense the same content into a single page they can hand over or send afterwards. This
      is the leave-behind that carries the idea when they are not in the room, so it must stand on its own
      and still end with the ask and a way to make contact.
    keyPrompts:
      - Could a stranger read this page and know what you do, why it matters and what you want?
      - How would someone reach you if this page interested them?
    watchOuts:
      - The brief becomes a shrunken copy of the deck. Remind learners it is read, not presented, so it needs full sentences and enough context to make sense alone.
    adaptation: |
      A handwritten single page is fine where printing or devices are limited; what matters is that it is
      self-contained and legible.
  - title: Craft and rehearse the elevator pitch
    duration: 30 min
    guidance: |
      Learners write and practise a spoken pitch of about one minute they can deliver from memory. Have
      them say it aloud to a partner at least twice and cut anything that does not earn its place. Every
      run must finish on the ask.
    keyPrompts:
      - Can you give the whole thing in about a minute without notes?
      - Did you end on your ask, and was it specific?
      - Where did you lose your listener, and what can you drop?
    watchOuts:
      - Learners memorise a script and freeze when they lose their place. Encourage them to learn the shape and key phrases rather than word-for-word text, so they can recover naturally.
    adaptation: |
      Pairs can rehearse over a phone call or voice note where meeting in person is hard, and send each
      other one piece of feedback in reply.
closing: |
  Ask a few learners to deliver their elevator pitch to the group and invite one specific reaction each:
  what was clear, and whether the ask landed. Have everyone save all three versions (deck, one-page brief
  and elevator pitch) together, since these feed directly into the simulated pitch and the final showcase.
agencyContribution:
  indicators: [control-of-future-pathways]
  how: >-
    Learners leave with three ways to put their idea in front of someone (a deck, a one-page brief
    and a spoken minute), each ending with a specific ask for time, connections, mentoring or
    funding. Being able to state an idea and name the help it needs is how learners pull support
    towards the future pathways they choose, instead of waiting for one to be offered.
principlesForegrounded: [recognise-communicate-growth, lifeworthy-competencies, connect-to-futures]
principleAlignment:
  - principle: recognise-communicate-growth
    how: >-
      The activity is entirely about turning work learners already did into something another person
      can follow and respond to. Rehearsing aloud and taking one specific reaction in the closing
      means they hear how their own progress reads to an outsider.
  - principle: lifeworthy-competencies
    how: >-
      Writing a one-page leave-behind, holding a room for a minute and asking clearly for what you
      need are the same moves used in funding conversations, job interviews and partnership
      approaches, so the practice keeps its value well outside this course.
  - principle: connect-to-futures
    how: >-
      Insisting that every version ends on a named ask makes learners identify the specific people
      and next steps that could carry the idea on, which is the point at which a course project
      starts to look like a route they could actually take.
competencyCodes: [FLC3, ATS2, FR1]
competencyDevelopment:
  - code: FLC3
    how: >-
      Learners build influential communication by shaping one set of content three ways for an
      audience and rehearsing the spoken version until it holds a listener for a minute. The deck,
      the brief and the delivered pitch are the evidence, together with whether the ask lands when
      the group reacts in the closing.
  - code: ATS2
    how: >-
      Where a project rests on scientific or environmental understanding, step 2 asks learners to
      state that understanding plainly and accurately for a non-expert audience. How that
      explanation reads on the page and sounds in the pitch is what shows whether they can stay
      accurate and still be understood.
  - code: FR1
    how: >-
      Naming a specific ask forces learners to work out which people, funds or support the idea
      actually needs next. The precision of that ask is the evidence: a named kind of help from a
      named kind of person, rather than general encouragement.
