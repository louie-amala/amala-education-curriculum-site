  Enriched into a structured facilitation flow (steps, prompts, watch-outs, adaptations)
  replacing the earlier prose educator and learner notes. Grounded in the 2025 course
  planner (5.2 producing a business plan, 5.3 what makes a powerful pitch, 5.4 developing
  the pitch) and the SE course guide objective 3 furtherDetails (pitch deck, one-page
  concept brief, elevator pitch). ATS2 applies only where learners use scientific
  understanding in their argument [to verify per learner project].
