id: evidence-log-and-source-evaluation
slug: evidence-log-and-source-evaluation
access: public
type: activity
title: Evidence log and source evaluation
summary: >-
  Learners build a running research log of secondary sources on their challenge,
  judging each source's credibility and recording what it tells them and where it came
  from.
facilitationContext: [independent, group]
primaryContext: group
deliveryAdaptations:
  - context: independent
    how: >-
      The log is kept independently in any case, so this holds, but the learner loses the argument
      over the ranking in step 2 and the partner's credibility challenge at the close. Ask them to
      write the case for and against each of the three prepared sources before committing to an
      order, and to find one person who will challenge a log entry, even by message.
  - context: group
    how: >-
      As designed. Keep the ranking in small groups and do not let them settle quickly, since the
      disagreement about the order is the teaching; then protect the short recurring check-ins in
      class time, or the log stops being updated once the introduction is over.
duration: About 2 hours to introduce, then recurring independent time to maintain the log
grouping: Individual work, with small groups for the ranking exercise; works with 15-35 learners
whatLearnersDo:
  - Keep a running log of every source you use to understand your challenge.
  - Judge each source with the CRAAP test before you rely on it.
  - Record what each source tells you, and how far you trust it and why.
  - Reference your sources so other people can follow and check your evidence.
  - Use AI tools to explore ideas, but cross-check everything and never treat an answer as a citation.
materialsAndPreparation:
  - A source evaluation log template per learner, with space for source details, a short summary, and a credibility note.
  - A CRAAP test reference card per learner (link a suitable one from the Resources section).
  - Three prepared sources on one topic at clearly different credibility levels, for the ranking exercise (for example a personal blog post, a UN-backed report, and an uncited social-media infographic).
  - Devices with internet access, or a folder of printed sources prepared in advance for low-connectivity settings.
  - A short, plain referencing guide appropriate to your context.
facilitationNotes: |
  This activity develops the desk-research side of the first objective, and it runs alongside
  the fieldwork rather than after it. The real goal is not to complete a checklist on a few
  sources; it is to change how learners habitually approach information, so they never rely on
  a source again without asking who made it and why. Spend the most time on Authority and
  Purpose, the two criteria that most reliably reveal bias and are most often skipped. Treat the
  log as a living artefact learners keep adding to, not a one-off worksheet.
steps:
  - title: Tell primary and secondary sources apart
    duration: 15-20 min
    guidance: |
      Open with a short, concrete distinction between primary sources (things learners gather
      themselves, like interviews and observations) and secondary sources (things others have
      already produced, like reports and articles). Connect it to the fieldwork learners are
      already doing, so the two strands feel like one investigation.
    keyPrompts:
      - Which of the sources you already have are primary, and which are secondary?
      - What can a report tell you that an interview cannot, and the other way round?
    watchOuts:
      - Learners treat secondary research as just searching online; remind them it also includes books, local records, radio, and people who hold knowledge in the community.
    adaptation: |
      With no connectivity, provide a small folder of printed or offline sources so learners can
      still practise, and set online searching as optional homework for those who have access.
  - title: Learn the CRAAP test by ranking three sources
    duration: 30-40 min
    guidance: |
      Give small groups the three prepared sources on one topic and ask them to rank them from
      most to least trustworthy, justifying each call. Only then introduce the CRAAP test
      (Currency, Relevance, Authority, Accuracy, Purpose) as the shared language for what they
      were already sensing. Using a topic learners do not personally care about lets them focus
      on the method rather than the content.
    keyPrompts:
      - Who published this, and how do you actually know that?
      - What would the person or organisation behind this gain from you believing it?
      - How current does this need to be for your particular challenge?
    watchOuts:
      - Learners treat the CRAAP score as a final verdict rather than a set of questions; reinforce that a low-authority source can still hold a useful fact, and a high-authority one can still be biased.
      - Groups rush to consensus; the disagreements about ranking are where the learning is, so draw them out rather than smoothing them over.
    adaptation: |
      The ranking exercise works on paper with printed sources and needs no devices, so it is a
      strong option when connectivity is limited.
  - title: Set up and keep your evidence log
    duration: 20-30 min, then recurring
    guidance: |
      Have each learner start a log for their own challenge. For every source they record the
      title, author or organisation, date and link; a short summary of what it tells them; and a
      credibility note based on the CRAAP test. Build in short recurring check-ins where learners
      add to the log and swap one source with a partner.
    keyPrompts:
      - What does this source actually add to your understanding that you did not already have?
      - If someone challenged this source, how would you defend keeping it or decide to drop it?
    watchOuts:
      - Logs record links but no evaluation; require a credibility note for every entry, however short.
      - Learners find one good source and stop; insist on a spread of source types.
    adaptation: |
      The log can live in a notebook or a shared document. For asynchronous groups, learners
      maintain it independently and bring it to each check-in.
  - title: Reference honestly and use AI critically
    duration: 20-25 min
    guidance: |
      Introduce basic referencing so learners can credit sources and others can retrace their
      evidence. If AI tools are available, model using them to explore ideas and generate search
      terms, and be explicit that AI output must be cross-checked against credible sources and
      never counts as a citation.
    keyPrompts:
      - How would someone else find exactly the source you used from your log entry?
      - When an AI tool gives you a claim, what do you do before you rely on it?
    watchOuts:
      - Learners paste AI output as fact; ask them to find and log the credible source behind any claim they want to keep.
    adaptation: |
      Where AI tools are unavailable, this step focuses on referencing alone, which needs no
      technology.
closing: |
  Have learners swap logs with a partner and pose one credibility challenge on a single entry,
  then revise it. Close by asking each learner to name the biggest gap still in their evidence,
  the thing none of their sources yet tell them, since that gap is often where the most valuable
  primary research will happen next. Learners keep the log as a living document they return to.
agencyContribution:
  indicators: [power-over-wellbeing-and-self-direction]
  how: >-
    Learners come away with a habit of asking who made a source and what they gain from it, and a
    log that records what they trust and why. Being able to judge information for themselves is
    what gives them power over their own decisions, rather than depending on whoever happens to be
    telling them something.
principlesForegrounded: [responsible-action, feedback-and-data, lifeworthy-competencies]
principleAlignment:
  - principle: responsible-action
    how: >-
      Every entry has to carry a credibility note and a reference someone else could follow, so
      learners are accountable for what they claim. AI tools are held to the same standard in step
      4: useful for exploring ideas, never acceptable as a citation.
  - principle: feedback-and-data
    how: >-
      The log is designed to be revisited rather than handed in. Learners add to it at recurring
      check-ins, swap sources with a partner, and in the closing revise an entry after someone has
      challenged its credibility.
  - principle: lifeworthy-competencies
    how: >-
      The CRAAP questions are first practised on a topic learners have no stake in, so the method
      rather than the content is what sticks, and only then turned on their own challenge. The
      target is a habit they apply to any information they meet, not a worksheet completed once.
competencyCodes: [FPS2, FSI1, FTS3, APS3]
competencyDevelopment:
  - code: FPS2
    how: >-
      Ranking three sources of clearly different quality and having to justify the order is where
      the judgement is built, and the credibility note on every log entry is what makes that
      judgement visible enough for a partner to challenge and the learner to defend or drop.
  - code: FSI1
    how: >-
      This is the secondary-research half of the investigation, run alongside the fieldwork rather
      than after it. What learners can show is a log covering a spread of source types, each
      summarised for what it adds to their understanding of the challenge.
  - code: FTS3
    how: >-
      Sources are gathered deliberately across formats (reports, books, local records, radio,
      people who hold knowledge in the community) and organised in one log with the same fields
      every time: source details, summary, credibility note. That consistency is what makes the
      collection usable later.
  - code: APS3
    how: >-
      Holding many sources side by side in one log is what lets learners see where accounts agree,
      where they conflict and what none of them covers. Naming the biggest remaining gap in the
      closing is the demonstration, and it sets the direction for the next round of research.
