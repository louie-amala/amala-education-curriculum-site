provenanceNote: >-
  Grounded in the 2025 course planner (Part 1.1 definitions of social enterprise and "Creating Shared Value"; Part 4 "Money-Making vs Problem-Solving"). The specific label "triple bottom line" (people, planet, profit) is a common framing of these ideas and is not used verbatim in the planner. [to verify] whether Amala wishes to use this named framework in learner-facing materials.
