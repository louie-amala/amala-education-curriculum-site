# Agency for positive change — the required outcome (spec §5.1).
# Source: Amala Learning Foundations, Draft VS14.
definition: >-
  The ability and will to make informed, intentional, and impactful decisions that improve
  one's own life and contribute to positive change in the wider community and world.
transformativeStatement: >-
  An education has been transformative when a learner develops agency for positive change —
  the capacity to make informed, intentional, and impactful decisions that improve their own
  life and contribute to positive change in the wider community.
indicators:
  - id: contribution-to-community
    label: Making impactful contributions to community
  - id: control-of-future-pathways
    label: Control of and access to future pathways
  - id: power-over-wellbeing-and-self-direction
    label: Power over wellbeing and self-direction
why: >-
  Amala serves refugee and conflict-affected youth — young people whose lives have often been
  shaped by forces they did not choose and cannot easily act on. Conventional measures of
  educational success (attainment, employability, subject mastery) matter, but none of them,
  on their own, answers the question that matters most for Amala's learners: can this education
  help them act in and on the world they find themselves in? Agency names the capacity to act
  with intention. Research on learner agency (OECD, 2018; 2025) treats it as one of the core
  aims of education, not a by-product of it, and as the condition that allows other outcomes
  to become real and durable. "Positive change" adds direction: agency in the absence of
  values can produce harm as easily as good. Amala's programmes are measured not by what
  learners know, or even by what they can do, but by what they are now able to change — for
  themselves and for others.
placement: >-
  The nine principles operate together as the conditions under which agency for positive change
  develops. The model is not a sequence; the principles apply at every stage of every programme,
  simultaneously.
