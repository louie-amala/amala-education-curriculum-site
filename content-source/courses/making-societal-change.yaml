# Intermediate extraction — mirrors spec §4.1 Course/Objective interfaces.
# Source: "Making Societal Change Course Guide - 2025 Onwards.docx"
# Verbatim from source; issues recorded, not corrected.
id: making-societal-change
slug: making-societal-change
access: public
title: Making Societal Change
strapline: null            # not present in guide — to author
programmes: [gsd]          # to confirm against programme-level docs
testimonial:
  quote: >-
    Each person has a role in his society and it is better for him to work to
    change it in a better way, so I will certainly advise this course in order to
    bring about positive change.
  attribution: Amala student in Jordan
purpose: >-
  Societal change happens when people, communities, and institutions work
  together to challenge injustice and create fairer, more inclusive systems. This
  course supports learners to understand how structures, policies, and collective
  action shape people’s lives locally and globally – and to recognise their own
  power and responsibility within those systems. Learners explore opportunities to
  take informed action or make meaningful contributions, whether by influencing
  systems, amplifying existing efforts, or initiating change within their own
  sphere of influence. Through research, dialogue, and ethical action, they
  examine how individuals and groups can work together to drive social, political,
  and economic transformation.
requirements:
  structuredHours: 100
  durationWeeks: 10          # "minimum of 10 weeks"
  cadence: 10+ weeks
  liveIndependentSplit: null # no specific live/independent split stated in guide
  notes: >-
    Structured learning should include both live sessions (individual and/or
    group) and independent learning (individual and/or group tasks).

objectives:
  - statement: >-
      Recognise and analyse how systems, structures, and policies shape people’s
      lives at local, national, and global levels.
    supportedTo:
      - Identify systems (e.g. education, health, economy, governance) that influence people’s lives in their context.
      - Explore how these systems interact across local, national, and global scales.
      - Investigate examples of societal change driven by institutions, civil society, or collective action.
      - Analyse who benefits and who is disadvantaged within existing structures or policies.
      - Recognise the roles of power, privilege, and inequality in maintaining or challenging the status quo.
      - Reflect on their own position and relationship to these systems.
    furtherDetails:            # raw seeds → future concepts/tools/activities (NOT yet authored materials)
      concepts: []             # no named theories/frameworks in this column
      activities:
        - Relevant case studies of historical or current societal change (e.g. movements, reforms, international agreements).
        - System-mapping or power-mapping exercises to visualise relationships and influence.
        - Primary or secondary research into a policy or system affecting learners’ communities.
        - Group discussions on conflict, cooperation, and interdependence between systems.
        - Reflective writing or visual outputs showing how learners understand their own place within systems.
    competencyEvidence:
      - { code: FPS3, citedTitle: Identifying contributing factors, condition: "If learners identify and evidence factors shaping societal outcomes." }
      - { code: FSI1, citedTitle: Investigate real-world issues, condition: "If learners conduct primary and secondary research into systems or policies." }
      - { code: FUS2, citedTitle: Understanding other people, condition: "If learners recognise how systems affect different groups differently." }
      - { code: FUS3, citedTitle: Exploring other cultures, condition: "If learners explore how cultural factors shape policy and governance." }

  - statement: >-
      Develop, test, and refine strategies for influencing or transforming systems
      to create more just and inclusive societies.
    supportedTo:
      - Generate multiple possible strategies for influencing systems or structures (e.g. awareness campaigns, petitions, dialogues, creative expression).
      - Research examples of activism, advocacy, or institutional reform to inform their own ideas.
      - Test small-scale strategies safely and ethically, gathering feedback and evidence of impact.
      - Reflect on the effectiveness and inclusivity of each strategy.
      - Adapt and refine their approach based on feedback, feasibility, and ethical considerations.
      - Evaluate the potential short- and long-term implications of their strategies.
    furtherDetails:
      concepts: []
      activities:
        - Brainstorm and prototype strategies for influencing policy or systems.
        - Scenario analysis of successful and unsuccessful social movements or advocacy campaigns.
        - Testing and refining ideas through feedback loops or pilot actions.
        - Journals or logs capturing changes made and lessons learned.
        - Final report, campaign, or presentation showcasing the tested strategy and its evolution.
    competencyEvidence:
      - { code: FSI2, citedTitle: Ideate sustainable solutions, condition: "If learners generate and develop strategies to influence systemic change." }
      - { code: FSI3, citedTitle: Pilot sustainable solutions, condition: "If learners test small-scale strategies and gather feedback." }
      - { code: FLC1, citedTitle: Ethical actions, condition: "If learners consider the ethical implications of their strategies and take responsible action." }
      - { code: ASL1, citedTitle: Using feedback, condition: "If learners adapt and improve their strategies based on reflection and feedback." }
      - { code: FPS1, citedTitle: Adaptable thinking, condition: "If learners adjust approaches to navigate complexity and resistance." }
      - { code: APS1, citedTitle: Addressing unintended consequences, condition: "If learners identify potential harms and refine strategies accordingly." }

  - statement: >-
      Collaborate ethically with others to build collective action towards positive
      societal change.
    supportedTo:
      - Identify individuals, groups, and organisations who are already working towards positive change.
      - Practise inclusive and respectful communication to build shared understanding and trust.
      - Contribute meaningfully to existing collective action efforts where appropriate, or co-create new initiatives in collaboration with others.
      - Recognise and value different perspectives, expertise, and lived experiences.
      - Reflect on how collaboration, solidarity, and participation strengthen impact.
      - Communicate outcomes and learning to broader audiences in ethical and empowering ways.
    furtherDetails:
      concepts: []
      activities:
        - Stakeholder-mapping and partnership-building exercises identifying who is already doing relevant work.
        - Collaborative project planning or campaign design sessions with peers or external groups.
        - Opportunities to contribute to existing advocacy campaigns, community events, or civic initiatives.
        - Group simulations of coalition-building, negotiation, or advocacy.
        - Peer feedback sessions on teamwork and inclusive practices.
        - Reflection pieces on the dynamics of collaboration, shared leadership, and collective action.
        - Shared presentations or exhibitions celebrating collaborative achievements and partnerships.
    competencyEvidence:
      - { code: FLC2, citedTitle: Fostering connection and belonging, condition: "If learners build inclusive environments for cooperation." }
      - { code: FLC3, citedTitle: Influential communication, condition: "If learners communicate effectively to inspire participation and support." }
      - { code: ALC2, citedTitle: Facilitating collaborative decision making, condition: "If learners design and guide inclusive group processes." }
      - { code: FUS2, citedTitle: Understanding other people, condition: "If learners demonstrate empathy and perspective-taking in collaboration." }
      - { code: AUS2, citedTitle: Intercultural understanding, condition: "If learners work effectively across cultural or social differences." }
      - { code: ASL3, citedTitle: Leverage networks and relationships, condition: "If learners identify and utilise networks to strengthen collective impact." }

principleMappings:
  # Guide lists 8 principles (see sourceIssues). Stored in guide order.
  - principle: builds-on-identities
    inThisCourse:
      - Learners begin with examples of social, economic, and political change from their own communities and regions.
      - Activities invite learners to share personal experiences of cooperation, inequality, or governance.
      - Facilitators use learners’ lived contexts to anchor global concepts such as activism, policy, or systemic change.
  - principle: collaboration
    inThisCourse:
      - Learners co-design inquiry questions or choose which societal issues to explore.
      - Guest speakers, community organisers, and local NGOs contribute perspectives and resources.
      - Educators adapt activities based on learner input and emerging issues in their contexts.
  - principle: lifeworthy-competencies
    inThisCourse:
      - Learners build understanding of systems thinking, power, policy, and advocacy.
      - Activities strengthen transferable skills such as communication, negotiation, collaboration, and analysis.
      - Learners link these skills to future civic participation, leadership, and further study or employment.
  - principle: authentic-challenges
    inThisCourse:
      - Learners investigate systems and structures that shape local and global challenges.
      - Projects focus on developing and testing realistic strategies for influencing or improving these systems.
      - Learners reflect on how their efforts contribute to existing community or national initiatives.
  - principle: responsible-action
    inThisCourse:
      - Learners examine the ethical implications of activism, advocacy, and policy engagement.
      - Discussions explore safety, representation, and responsible use of voice and power.
      - Learners assess whether proposed strategies are inclusive, feasible, and sustainable.
  - principle: recognise-communicate-growth
    inThisCourse:
      - Learners document how their ideas or actions have evolved through feedback and collaboration.
      - Presentations, portfolios, or showcases highlight both personal growth and collective impact.
      - Learners reflect on their role within broader movements for social change.
  - principle: feedback-and-data
    inThisCourse:
      - Learners gather feedback from peers, community partners, and audiences on their strategies for change.
      - Facilitators use reflections and outcomes from each project cycle to adapt future learning experiences.
      - Feedback is treated as a learning tool for continuous improvement rather than final judgement.
  - principle: safe-spaces
    inThisCourse:
      - Facilitators co-create ground rules for respectful dialogue on political and social topics.
      - Activities are designed to manage disagreement constructively and ensure all voices are heard.
      - Learners are supported to discuss sensitive issues safely and with empathy.
      - Educators remain alert to local sensitivities and adapt examples or terminology as needed.

designChecklist:
  - My course design includes ~100 hours of learning experiences/tasks
  - My course design is appropriate for my context (e.g. relevant problems, safe activities, resource-optimised, culturally and linguistically accessible).
  - My course design is mostly aligned with Amala’s principles for transformative education (and where the course is not aligned, I have reflected on how I can improve alignment in the future).
  - Course design supports learners in making progress towards all of the course objectives.
  - Opportunities for learners to generate and submit evidence that can be used to evaluate their proficiency in the Amala competencies are built in to the course design.

sourceIssues:
  - type: cross-course-copy-paste
    detail: >-
      Course Learning Design Checklist intro reads "Meets the time and
      contextualisation requirements for the Social Entrepreneurship course" —
      should reference Making Societal Change. Same error appears in multiple guides.
  - type: missing-principle
    detail: >-
      Guide lists 8 principles and omits connect-to-futures ("connect learning to
      the futures they are building"); it has no inThisCourse mapping.
  - type: strapline-missing
    detail: No strapline in source; needs authoring.
  - type: programme-membership-to-confirm
    detail: programmes set to [gsd] as placeholder; confirm against programme-level docs.
