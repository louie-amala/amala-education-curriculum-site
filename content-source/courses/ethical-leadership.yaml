    detail: >-
      Course Learning Design Checklist reads "Meets the time and contextualisation
      requirements for the Social Entrepreneurship course" — should reference Ethical
      Leadership. Same error appears in multiple guides.
  - type: missing-principle
    detail: >-
      Guide lists 8 principles and omits "connect-to-futures" (connect learning to the
      futures learners are building); it has no inThisCourse mapping.
  - type: strapline-missing
    detail: No strapline in source; needs authoring.
  - type: programme-membership-to-confirm
    detail: programmes set to [gsd] as placeholder; confirm against programme-level docs.
  - type: source-typo
    detail: >-
      Syllabus intro has a missing space between sentences ("guided by moral
      purpose.Throughout the course"). Preserved verbatim in purpose.
