# Intermediate extraction — mirrors spec §4.1 Course/Objective interfaces.
# Source: "Maths for Change Course Guide - 2025 Onwards.txt"
# Verbatim from source; issues recorded, not corrected.
id: maths-for-change
slug: maths-for-change
access: public
title: Maths for Change
strapline: null            # not present in guide — to author
programmes: [gsd]          # to confirm against programme-level docs
testimonial:
  quote: >-
    I can apply all the mathematical expression and numerical literacy to my
    daily life and also I like it as it can change my mind and also I know that
    we use math for positive change through entrepreneurship, economic business
    and technology also. It is a foundational course that attached itself to the
    real life world issues
  attribution: Amala student in Kakuma Refugee Camp
purpose: >-
  Mathematics helps people make sense of the world, solve problems, and make
  fair, informed decisions. This course supports learners to develop confidence
  in using mathematical skills and reasoning to understand everyday challenges
  and larger systems that shape people's lives. Learners practise applying
  mathematics to real-life situations, explore how data can reveal patterns of
  fairness, opportunity, and risk, and communicate quantitative evidence clearly
  to influence positive change.
requirements:
  structuredHours: 100
  durationWeeks: 10          # "minimum of 10 weeks"
  cadence: 10+ weeks
  liveIndependentSplit: null   # not stated in guide
  notes: >-
    Structured learning should include both live sessions (individual and/or
    group) and independent learning (individual and/or group tasks).

objectives:
  - statement: >-
      Practise using mathematical skills to solve problems in everyday life.
    supportedTo:
      - Use core mathematical operations (e.g. addition, subtraction, multiplication, division) confidently to plan, calculate, and check results in real contexts.
      - Use digital mathematical tools (spreadsheets, graphing and visualisation tools) to solve authentic problems, analyse data, and evaluate the accuracy of results in real-world contexts.
      - Apply mathematical thinking to everyday tasks such as budgeting, scheduling, measurement, and comparison.
      - Explore how accuracy (getting a result that is correct and precise), estimation (approximating a result to make quick judgments or checks), and reasonableness (evaluating whether a result is logical and realistic) contribute to sound decision making.
      - Reflect on how practising mathematical skills increases confidence, independence, and resourcefulness.
    furtherDetails:            # raw seeds → future concepts/tools/activities (NOT yet authored materials)
      concepts: []
      activities:
        - Learners could plan and monitor personal or group budgets for real or simulated projects.
        - Learners could compare prices, quantities, or rates to make fair purchasing or planning decisions.
        - Learners could measure and calculate materials or time needed for small projects such as building, cooking, or gardening.
        - Learners could investigate financial topics such as interest, inflation, or currency conversion and how they affect everyday life.
        - Learners could present short reflections or visual guides explaining how they used maths to solve a problem that mattered to them.
    competencyEvidence:
      - { code: FTS1, citedTitle: Utilising technology, condition: "If learners use digital or technological tools (e.g. calculators, spreadsheets, or measurement apps) to solve problems." }
      - { code: FTS3, citedTitle: Gather and organise data, condition: "If learners collect and organise numerical information to support everyday decisions." }
      - { code: APS2, citedTitle: Evidence-informed decision making, condition: "If learners use calculations to justify choices in personal or community contexts." }
      - { code: FSL2, citedTitle: Set and pursue goals, condition: "If learners plan, act, and reflect on how they use mathematics to meet real needs." }
      - { code: FLC1, citedTitle: Ethical actions, condition: "If learners apply mathematical reasoning to make fair or responsible use of resources." }

  - statement: >-
      Collect, analyse, and interpret new and existing quantitative data to
      support more informed decision making.
    supportedTo:
      - Explore the usefulness of understanding statistics, probability, and uncertainty in interpreting information.
      - Collect and analyse data using measures such as mean, median, range, standard deviation, and correlation.
      - Identify and explain patterns and disparities in data.
      - Evaluate how sampling, framing, or missing data can influence conclusions.
      - Reflect on how quantitative reasoning can clarify systems that affect people's lives and guide more just decisions.
    furtherDetails:
      concepts: []
      activities:
        - Learners could design or conduct surveys to gather new data about issues such as access to education, wellbeing, or local services.
        - Learners could use open data sources to explore inequality, climate trends, or economic indicators.
        - Learners could calculate descriptive statistics and visualise results through graphs or maps that show disparities.
        - Learners could model probabilities or scenarios to discuss risk or fairness in real-world decisions.
        - Learners could reflect in writing or discussion on what the data suggests about fairness, opportunity, or responsibility.
    competencyEvidence:
      - { code: FTS3, citedTitle: Gather and organise data, condition: "If learners collect and categorise primary or secondary quantitative data." }
      - { code: ATS1, citedTitle: Analyse and interpret data, condition: "If learners examine and visualise data to uncover patterns and generate insights." }
      - { code: FTS2, citedTitle: Science informed action, condition: "If learners use quantitative understanding of systems to make better-informed decisions." }
      - { code: APS2, citedTitle: Evidence-informed decision making, condition: "If learners apply insights from data to support ethical and reasoned conclusions." }
      - { code: FLC1, citedTitle: Ethical actions, condition: "If learners recognise bias, limitations, or fairness issues when interpreting and presenting data." }

  - statement: >-
      Communicate quantitative evidence clearly and persuasively to influence
      positive change.
    supportedTo:
      - Explore the usefulness of understanding data communication and visual storytelling in shaping understanding and decisions.
      - Present data accurately and ethically using visuals, narrative, and reasoning appropriate to the audience.
      - Apply mathematics to propose fair, sustainable, or cost-effective solutions to real-world challenges.
      - Reflect on how transparent communication of evidence can build trust and inspire action.
    furtherDetails:
      concepts: []
      activities:
        - Learners could design infographics, posters, or slide decks that use quantitative evidence to advocate for a decision or solution.
        - Learners could simulate presentations or community discussions to practise explaining evidence clearly.
        - Learners could analyse real examples of public data communication (e.g. media reports, campaigns) and evaluate credibility.
        - Learners could gather feedback from peers or audiences on clarity and persuasiveness, refining their approach.
        - Learners could produce a reflective commentary linking their communication choices to ethical and social impact.
    competencyEvidence:
      - { code: ATS1, citedTitle: Analyse and interpret data, condition: "If learners interpret and present data to support understanding or advocacy." }
      - { code: ATS2, citedTitle: Science communication, condition: "If learners use quantitative evidence to positively influence others' thinking or behaviour." }
      - { code: FTS1, citedTitle: Utilising technology, condition: "If learners use digital or visual tools to create accurate and engaging data presentations." }
      - { code: APS2, citedTitle: Evidence-informed decision making, condition: "If learners integrate data and reasoning into persuasive, ethical communication." }
      - { code: FLC3, citedTitle: Influential communication, condition: "If learners communicate quantitative reasoning clearly and compellingly to diverse audiences." }

principleMappings:
  # Guide lists 8 principles (see sourceIssues). Stored in guide order.
  - principle: builds-on-identities
    inThisCourse:
      - Learners connect mathematics to real experiences, decisions, and challenges in their lives and communities.
      - Educators design examples and problems rooted in relevant local contexts, such as income, transport, energy, or resource use.
      - Learning experiences highlight that mathematical knowledge is not neutral — it reflects cultural, social, and historical ways of understanding the world.
  - principle: collaboration
    inThisCourse:
      - Learners co-design projects and investigations that use mathematics to address meaningful problems.
      - Community members or professionals may be invited to share how they use mathematical reasoning in everyday work or decision-making.
      - Facilitators model collaborative problem-solving, encouraging learners to explain reasoning and learn from different approaches.
  - principle: lifeworthy-competencies
    inThisCourse:
      - Learners build confidence in using mathematical tools to plan, reason, and evaluate — skills essential in study, work, and life.
      - The course fosters persistence, accuracy, and curiosity alongside creativity and ethical reflection.
      - Learners see mathematics as a universal language for analysing systems, making fair decisions, and communicating ideas effectively.
  - principle: authentic-challenges
    inThisCourse:
      - Learners apply mathematics to investigate and propose solutions to real issues — from budgeting and sustainability to equality of access or environmental change.
      - They use quantitative reasoning to test ideas, model outcomes, and make evidence-based recommendations.
      - Facilitators guide learners to reflect on both the strengths and limitations of mathematical models in complex social and environmental contexts.
  - principle: responsible-action
    inThisCourse:
      - Learners explore how data can reveal — or conceal — fairness, justice, and inequality.
      - Activities promote ethical data use, transparency, and critical awareness of bias in measurement, sampling, and interpretation.
      - Facilitators model integrity in reasoning and communication, emphasising responsibility in presenting quantitative information.
  - principle: recognise-communicate-growth
    inThisCourse:
      - Learners present findings that show how mathematics can support equitable, sustainable, or efficient outcomes.
      - Reflection tasks help learners evaluate how using data and reasoning has shaped their decisions and perspectives.
      - Educators celebrate both the learning process and the positive impact of learners' reasoning on their communities.
  - principle: feedback-and-data
    inThisCourse:
      - Learners and facilitators collect evidence from investigations, reflections, and audience feedback to evaluate learning impact.
      - Educators adapt activities based on learner progress and emerging questions about fairness, risk, and decision-making.
      - Programmes evolve based on data showing which approaches best strengthen mathematical confidence and ethical reasoning.
  - principle: safe-spaces
    inThisCourse:
      - Facilitators build supportive environments where learners feel safe to make mistakes and reason openly.
      - Learners practise giving and receiving feedback constructively, focusing on reasoning rather than right answers.
      - Educators recognise and address maths anxiety, encouraging a growth mindset and celebrating progress at every level.

designChecklist:
  - My course design includes ~100 hours of learning experiences/tasks
  - My course design is appropriate for my context (e.g. relevant problems, safe activities, resource-optimised, culturally and linguistically accessible).
  - My course design is mostly aligned with Amala's principles for transformative education (and where the course is not aligned, I have reflected on how I can improve alignment in the future).
  - Course design supports learners in making progress towards all of the course objectives.
  - Opportunities for learners to generate and submit evidence that can be used to evaluate their proficiency in the Amala competencies are built in to the course design.

sourceIssues:
  - type: cross-course-copy-paste
    detail: >-
      Course Learning Design Checklist intro reads "Meets the time and
      contextualisation requirements for the Social Entrepreneurship course" —
      should reference Maths for Change. Same error appears in multiple guides.
  - type: missing-principle
    detail: >-
      Guide lists 8 principles and omits connect-to-futures ("connect learning
      to the futures they are building"); it has no inThisCourse mapping.
  - type: miscited-competency
    detail: >-
      ATS1 cited as "Analyse and interpret data" (objectives 2 and 3); the
      authoritative title is "Analyze and Interpret Data". Orthographic variant
      (British spelling / capitalisation) — preserved as written, not corrected.
  - type: miscited-competency
    detail: >-
      APS2 cited as "Evidence-informed decision making" (all three objectives);
      the authoritative title is "Evidence informed decision making" (no
      hyphen). Preserved as written, not corrected.
  - type: miscited-competency
    detail: >-
      FTS1 cited as "Utilising technology" (objectives 1 and 3); the
      authoritative title is "Utilising Technology" (capital T). Case variant —
      preserved as written, not corrected.
  - type: strapline-missing
    detail: No strapline in source; needs authoring.
  - type: programme-membership-to-confirm
    detail: programmes set to [gsd] as placeholder; confirm against programme-level docs.
